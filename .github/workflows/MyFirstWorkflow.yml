name: my-first-workflow
# to get trigger on every push in the repo
on: 
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  unit-test:

    name: Running unit test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6.2.0
        with:  
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: |
          mkdir -p reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml --cov-report=term-missing -v
        # pytest        → 跑测试
        # -v            → 显示详细结果
        # --junitxml    → 导出测试报告
        # --cov         → 开启覆盖率统计
        # --cov-report  → 指定覆盖率输出方式
      - name: Upload test report
        uses: actions/upload-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/
  
  sonarqube:  
    name: SonarQube code analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
          with:
            fetch-depth: 0 # 这个参数很重要，必须设置为 0，才能让 SonarQube 获取完整的 git 历史记录，正确分析代码质量
      - name: Setup SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # 这个 token 是你在 SonarQube 上生成的访问令牌，必须保存在 GitHub Secrets 里，才能安全地使用

  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    # permissions = 这个 workflow 能做什么
    # read = 只能看
    # write = 可以改/上传
    # CodeQL 必须有 security-events: write 才能上传扫描结果
    # CodeQL = GitHub 的“代码安全扫描工具”
    # 它会自动帮你检查代码里有没有漏洞（比如 SQL 注入、XSS、路径注入等）
    strategy:
      matrix:
        language: ['python']
    # matrix ≈ for循环
    # 这里的意思是：这个 job 会针对 matrix 里定义的每种语言都执行一次 
    # 我要用 CodeQL 去分析 检查“仓库里的代码”，不是检查 workflow 本身”   多语言，多系统，多版本
    #  matrix:
    # python-version: ['3.10', '3.11', '3.12'] 
    steps:
      - name: Checkout repository # 把仓库里的代码拉下来，准备分析
        uses: actions/checkout@v6.0.2
      - name: Initialize CodeQL    # 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }} 
      - name: Autobuild # 自动构建
        uses: github/codeql-action/autobuild@v4   # 这个 action 会帮你自动编译代码，准备好供 CodeQL 分析的环境
      - name: Perform CodeQL Analysis # 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v4
        with:
          category: "security"
        # category = 这个扫描的类型，security 就是安全扫描
  







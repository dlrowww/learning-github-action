name: my-first-workflow
# to get trigger on every push in the repo
on: 
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  ENV_TYPE: DEV
  APP_USER: thinknyx
  APP_PORT: 80
jobs:
  job1:
    name: job1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: step2-Checkout
        uses: actions/checkout@v6.0.2
      - name: step3
        run: |
          echo 'pwd' >> myartifact.txt
          mkdir artifact
          echo 'ls -ltr' >> artifact/list.txt
          echo 'hostname' >> artifact/host.txt
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: ./myartifact.txt
      - name: upload2
        uses: actions/upload-artifact@v4
        with:
          name: directory_file
          path: artifact/
      - name: upload3
        uses: actions/upload-artifact@v4
        with:
          name: multiple
          path: |
            artifact/list.txt
            ./myartifact.txt
      - name: upload4
        uses: actions/upload-artifact@v4
        with:
          name: multiple_with_exclusion
          path: |
            ./myartifact.txt
            artifact/
            !**/hostname.txt              #exclusion
  job2:
    name: job2
    needs: job1
    runs-on: ubuntu-22.04
    steps:
      - name: checking current directory
        run: |
          pwd
          ls -ltr
      - name: download artifact
        uses: actions/download-artifact@v8
        with: 
          name: single_file
      - name: checking current directory post download
        run: |
          pwd
          ls -ltr
      - name: step for fail
        run: exit 0
      - name: referring environment variable
        run: echo "[INFO] Running Deployment for $ENV_TYPE with user $APP_USER."
             echo "[INFO] Once deployment application is accessiable on port $APP_PORT." 
      - name: referring respository secret
        run: |
          echo "[INFO] application password is ${{ secrets.APP_PASSWORD }}"
  job3:
    name: job3
    runs-on: ubuntu-latest
    steps:
      - name: referring context or in-built variable
        run: |
          echo "[INFO] triggered by ${{ github.event_name }}"
          echo "[INFO] New changes are added by ${{ github.actor }}"
          echo "[INFO] current step is running on ${{ runner.os }}"
          echo "[INFO] Current job id is ${{ job.check_run_id }}"
  staging:
    name: stage deployment
    runs-on: ubuntu-latest
    environment:
       name: STAGING
    steps:
      - name: referring environment variabele
        run: echo "[INFO] running deployment on ${{ vars.HOST }} using ${{ vars.USER }}"
      - name: referring environment secrets
        run: echo "[INFO] Password for ${{ vars.USER }} is ${{ secrets.PASSWORD }}"
  production:
    name: production deployment
    runs-on: ubuntu-latest
    environment:
       name: PRODUCTION
    steps:
      - name: referring environment variabele
        run: echo "[INFO] running deployment on ${{ vars.HOST }} using ${{ vars.USER }}"
      - name: referring environment secrets
        run: echo "[INFO] Password for ${{ vars.USER }} is ${{ secrets.PASSWORD }}"




















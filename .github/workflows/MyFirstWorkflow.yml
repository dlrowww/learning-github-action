name: my-first-workflow
# to get trigger on every push in the repo
on: 
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  unit-test:

    name: Running unit test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6.2.0
        with:  
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: |
          mkdir -p reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
        # pytest        → 跑测试
        # -v            → 显示详细结果
        # --junitxml    → 导出测试报告
        # --cov         → 开启覆盖率统计
        # --cov-report  → 指定覆盖率输出方式
      - name: Upload test report
        uses: actions/upload-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/
  
  sonarqube:  
    name: SonarQube code analysis
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 这个参数很重要，必须设置为 0，才能让 SonarQube 获取完整的 git 历史记录，正确分析代码质量
      - name: Download unit test artifact # 这个步骤是把上一个 job 生成的测试报告下载下来，供 SonarQube 使用
        uses: actions/download-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/

      - name: Setup SonarQube Scanner # 这个 action 是 SonarSource 官方提供的，用来在 GitHub Actions 里运行 SonarQube 扫描的
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # 这个 token 是你在 SonarQube 上生成的访问令牌，必须保存在 GitHub Secrets 里，才能安全地使用
      - name: SonarQube quality gate check # 这个步骤是可选的，但强烈推荐添加。它会检查 SonarQube 的质量门是否通过，如果不通过，整个 workflow 就会失败，提醒你修复代码质量问题
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 



  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    # permissions = 这个 workflow 能做什么
    # read = 只能看
    # write = 可以改/上传
    # CodeQL 必须有 security-events: write 才能上传扫描结果
    # CodeQL = GitHub 的“代码安全扫描工具”
    # 它会自动帮你检查代码里有没有漏洞（比如 SQL 注入、XSS、路径注入等）
    strategy:
      matrix:
        language: ['python']
    # matrix ≈ for循环
    # 这里的意思是：这个 job 会针对 matrix 里定义的每种语言都执行一次 
    # 我要用 CodeQL 去分析 检查“仓库里的代码”，不是检查 workflow 本身”   多语言，多系统，多版本
    #  matrix:
    # python-version: ['3.10', '3.11', '3.12'] 
    steps:
      - name: Checkout repository # 把仓库里的代码拉下来，准备分析
        uses: actions/checkout@v6.0.2
      - name: Initialize CodeQL    # 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }} 
      - name: Autobuild # 自动构建
        uses: github/codeql-action/autobuild@v4   # 这个 action 会帮你自动编译代码，准备好供 CodeQL 分析的环境
      - name: Perform CodeQL Analysis # 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v4
        with:
          category: "security"
        # category = 这个扫描的类型，security 就是安全扫描
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: [sonarqube, codeql] # 这个 job 依赖前面三个 job，必须等它们都成功了才会执行
    if: sucess()
    # 这个条件是说：只有前面三个 job 都成功了，这个 job 才会执行，如果有任何一个失败了，这个 job 就会被跳过
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3.0.0
      - name: Generate Image Tag
        id: vars
        run: |
          IMAGE_TAGS ="${{ github.run_id }}-${{ GITHUB_SHA::7 }}" 
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT 
        # 这个 tag 是用来标识这次构建的唯一标识，通常会包含 run_id 和 commit 的前7位哈希值，这样每次构建都会有一个独特的 tag
        # 这个命令是把 IMAGE_TAGS 这个变量的值输出到 GitHub Actions 的输出变量里，这样后续的步骤就可以通过 ${{ steps.vars.outputs.IMAGE_TAGS }} 来使用这个 tag
      - name: Build Image (no push)
      # 这个步骤是构建 Docker 镜像，但不推送到 Docker Hub，等测试通过了再推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # 这个参数是说：先构建镜像，但不推送到 Docker Hub，等测试通过了再推送
          tags: simonzhang1996/learning-github-action:${{ steps.vars.outputs.IMAGE_TAGS }} # 这个 tag 是我们在上一步生成的唯一标识，用来标记这次构建的镜像
      - name: Save Docker image as artifact
        run: |
          docker save simonzhang1996/learning-github-action:${{ steps.vars.outputs.IMAGE_TAGS }} -o docker-image.tar
        # 这个命令是把构建好的 Docker 镜像保存成一个 tar
        with:
          name: docker-image
          path: docker-image.tar
      





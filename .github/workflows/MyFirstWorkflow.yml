name: my-first-workflow
# to get trigger on every push in the repo
on: 
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  unit-test:
    name: Running unit test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6.2.0
        with:  
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: |
          mkdir -p reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml --cov-report=term-missing -v
        # pytest        → 跑测试
        # -v            → 显示详细结果
        # --junitxml    → 导出测试报告
        # --cov         → 开启覆盖率统计
        # --cov-report  → 指定覆盖率输出方式
      - name: Upload test report
        uses: actions/upload-artifact@v3.1.2
        with:
          name: unit-test-report
          path: reports/
















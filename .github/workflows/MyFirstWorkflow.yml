name: my-first-workflow
# to get trigger on every push in the repo
on: 
  push: 
jobs:
  job1:
    name: JoB1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: step2-Checkout
        uses: actions/checkout@v6.0.2
      - name: step3
        run: |
          echo 'pwd' >> myartifact.txt
          mkdir artifact
          echo 'ls -ltr' >> artifact/list.txt
          echo 'hostname' >> artifact/host.txt
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: ./myartifact.txt
      - name: upload2
        uses: actions/upload-artifact@v4
        with:
          name: directory_file
          path: artifact/
      - name: upload3
        uses: actions/upload-artifact@v4
        with:
          name: multiple
          path: |
            artifact/list.txt
            ./myartifact.txt
      - name: upload4
        uses: actions/upload-artifact@v4
        with:
          name: multiple_with_exclusion
          path: |
            ./myartifact.txt
            artifact/
            !**/hostname.txt              #exclusion
  job2:
    name: job2
    needs: job1
    runs-on: ubuntu-22.04
    steps:
      - name: checking current directory
        run: |
          pwd
          ls -ltr
      - name: download artifact
        uses: actions/download-artifact@v8
        with: 
          name: single_file
      - name: checking current directory post download
        run: |
          pwd
          ls -ltr
  job3:
    name: job3
    needs: job1
    runs-on: ubuntu-22.04
    steps:
      - name: checking current directory
        run: |
          pwd
          ls -ltr
      - name: download artifact
        uses: actions/download-artifact@v8
        with: 
          name: directory_file
      - name: checking current directory post download
        run: |
          pwd
          ls -ltr
  job4:
    name: job3
    needs: job1
    runs-on: ubuntu-22.04
    steps:
      - name: creating custom directory
        run: |
          mkdir -p single_file
          mkdir -p download_file
      - name: checking current directory
        run: |
          pwd
          ls -ltr
      - name: download artifact single
        uses: actions/download-artifact@v8
        with: 
          name: single_file
          path: single_file
      - name: download artifact directory
        uses: actions/download-artifact@v8
        with: 
          name: directory_file
          path: download_file
      - name: checking current directory post download
        run: |
          pwd
          echo "checking single file"
          ls -ltr single_file
          echo "checking download_file directory"
          ls -ltr download_file






  
    
